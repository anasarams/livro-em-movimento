<h1>Livros disponíveis</h1>

{% for livro in livros %}
    <div>
        <h2>{{ livro.titulo }}</h2>
        <p>{{ livro.autor }}</p>
        <p>{{ livro.descricao }}</p>
        <p>R$ {{ livro.preco }}</p>

        {% if livro.imagem %}
            <img src="{{ livro.imagem.url }}" width="150">
        {% endif %}
    </div>
{% empty %}
    <p>Nenhum livro disponível.</p>
{% endfor %}
